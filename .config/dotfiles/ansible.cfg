[defaults]
# Connection timeout
timeout = 60

# Don't create .retry files on failure
retry_files_enabled = False

# Use colors in output for better readability
force_color = True

# Show diffs when making changes
diff_always = False

[privilege_escalation]
# Increase timeout for become (sudo) password prompt to 60 seconds
# This gives the user enough time to enter their sudo password
# without timing out (default is 12 seconds)
become_timeout = 60

# Become settings - used for sudo operations
become_ask_pass = False
