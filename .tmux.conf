# ================================================
# PREFIX AND BASIC CONFIGURATION
# ================================================
# Use ` (backtick) as the prefix instead of the default C-b.
set -g prefix "`"
# Drop the default C-b prefix binding so it's free for the shell/programs.
unbind C-b
# Press the prefix twice (`` ` ` ``) to type a literal backtick.
bind "`" send-prefix

# When attaching to an existing session, refresh PATH from the calling
# shell's environment (so a freshly-updated PATH reaches old sessions).
set -g update-environment "PATH"

# ================================================
# TERMINAL AND COLOR SUPPORT
# ================================================
# Enable true color (24-bit) support for terminals.
# default-terminal must be set before any windows are created, otherwise
# the first window inherits the wrong TERM and apps inside it fall back
# to 256-color (approximating the hex backgrounds to ugly nearest matches).
# tmux-256color is in ncurses since ~2017 and shipped with macOS Catalina+.
# terminal-features (3.2+) is the modern path; terminal-overrides is the
# legacy fallback. Set both so older and newer tmux builds both light up.
set -g default-terminal tmux-256color
set -as terminal-features ",*256col*:RGB"
set -sa terminal-overrides ",*256col*:Tc"

# Advertise OSC 8 hyperlink support to all terminals so apps can emit
# clickable links through tmux.
set -sa terminal-features "*:hyperlinks"

# ================================================
# GENERAL SETTINGS
# ================================================
# pass focus events through to applications (needed for Claude Code, etc.)
set -g focus-events on

# Ring/flag the status bar on a bell from any window, not just the active one.
set -g bell-action any
# Pick the right shell for the platform. We use if-shell with /etc/passwd
# as a POSIX detector because psmux 3.3.4's format engine doesn't support
# #{E:VAR} env-var expansion, so config-time %if guards on TMUX_PLATFORM
# don't work. /bin/sh + /etc/passwd both exist on POSIX and neither on
# Windows, where if-shell falls back to a shell that errors out — exit
# non-zero either way → false branch runs. Two separate if-shell calls
# because `;` inside an if-shell command string is a literal char, not
# a tmux command separator.
# default-shell: the login shell tmux spawns; default-command: the command
# run in each new pane (set so panes are interactive login shells).
if-shell 'test -f /etc/passwd' \
    'set -g default-shell $SHELL' \
    'set -g default-shell pwsh'
if-shell 'test -f /etc/passwd' \
    'set -g default-command $SHELL' \
    'set -g default-command pwsh'

# Number windows and panes from 1 instead of 0 (easier to reach on the keyboard).
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
# After closing a window, renumber the rest so there are no gaps.
set -g renumber-windows on

# don't rename windows automatically
set -g allow-rename off

# ================================================
# NAVIGATION KEYBINDINGS
# ================================================
# Ctrl+Right / Ctrl+Left cycle through windows (no prefix needed).
bind -n C-right next
bind -n C-left prev

# Split windows with | (horizontal) and - (vertical), opening the new pane
# in the same directory as the current one. Unbind the default % and " first.
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# prefix+o cycles to the next pane.
bind o select-pane -t :.+

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ================================================
# STATUS BAR AND APPEARANCE
# ================================================
# Let tmux set the terminal emulator's window/tab title, using the format
# "session:window.pane window-name".
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# put status bar at top
set -g status-position top
# Status bar background (Catppuccin Mocha base).
set -g status-style 'bg=#1e1e2e'

# update the status bar every 3 seconds
set -g status-interval 3
# Left side: session name @ hostname.
set -g status-left "#[fg=blue,bold,bg=#1e1e2e]  #S \@ #H  "
# Right side: weekday, ISO date, and 12-hour clock.
set -g status-right "#[fg=#b4befe,bold,bg=#1e1e2e]%a %Y-%m-%d %l:%M %p"
# Left-align the window list.
set -g status-justify left
# Allow long left/right sections (defaults are only 10 chars).
set -g status-left-length 200
set -g status-right-length 200

# Highlight windows with background activity, and show a message when it happens.
setw -g monitor-activity on
set -g visual-activity on

# ================================================
# MOUSE AND COPY MODE
# ================================================
# Enable mouse support (select panes/windows, resize, scroll). -q stays quiet
# if the option name isn't recognized.
set -g -q mouse on

# send copied text to the system clipboard via OSC 52 escape sequences.
# terminal-agnostic and cross-platform — no pbcopy/xclip/wl-copy needed,
# so this works the same on POSIX and Windows as long as the terminal
# emulator supports OSC 52.
set -g set-clipboard on
# Let a program inside tmux pass an escape sequence straight through to the
# outer terminal (DCS passthrough). Needed for tools that emit their own
# OSC 52 rather than relying on set-clipboard (e.g. Neovim's clipboard
# provider), nested tmux, and terminal graphics protocols (Kitty / iTerm2
# inline images).
set -g allow-passthrough on
# Page Up enters copy-mode and scrolls up — unless the program is using the
# alternate screen (e.g. less/vim), in which case pass Page Up straight through.
bind -T root PPage if-shell -F "#{alternate_on}" "send-keys PPage" "copy-mode -e; send-keys PPage"

# Mouse wheel scrolls naturally: forward it to fullscreen apps on the alternate
# screen, otherwise enter copy-mode (up) / scroll normally (down).
bind -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# ================================================
# PANE MANAGEMENT
# ================================================
# Resize the current pane: = down, + up, < left, > right (5 cells each).
bind = resize-pane -D 5
bind + resize-pane -U 5
bind < resize-pane -L 5
bind > resize-pane -R 5
# prefix+z toggles zoom (fullscreen) for the current pane.
bind z resize-pane -Z

# ================================================
# UTILITY COMMANDS
# ================================================
# prefix+R redraws the client (clears display glitches).
bind R refresh-client

# prefix+r reloads this config file.
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ================================================
# POPUP & MENU TOOLS
# ================================================
# prefix+C-y opens lazygit in an 80%×80% popup, rooted at the pane's directory.
bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% -h 80% \
  -S -E "lazygit"
# prefix+C-t opens a throwaway shell popup (pwsh on Windows, zsh on POSIX —
# see if-shell note above), rooted at the pane's directory.
if-shell 'test -f /etc/passwd' \
    'bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh"' \
    'bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "pwsh"'
# prefix+C-s opens the session-switching menu (tmux-session-menu is a unix
# shell script; only bind on POSIX where it can run).
if-shell 'test -f /etc/passwd' \
    'bind-key C-s run-shell tmux-session-menu'
